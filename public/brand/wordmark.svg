<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img" aria-label="Commando Conditioning wordmark">
  <title>Commando Conditioning</title>
  <g font-family="Impact, Oswald, Stencil Std, Arial Black, sans-serif" font-weight="900" fill="#0a0a0a" letter-spacing="6">
    <!-- Line 1: COMM[dagger]NDO -->
    <text x="60" y="140" font-size="120">COMM</text>
    <text x="540" y="140" font-size="120">NDO</text>
    <g transform="translate(488,70)">
      <path d="M0 -30 L-20 60 L20 60 Z" fill="#0a0a0a"/>
      <rect x="-5" y="60" width="10" height="36" fill="#0a0a0a"/>
      <rect x="-25" y="55" width="50" height="6" fill="#0a0a0a"/>
    </g>
    <!-- Line 2: CONDI[dagger]IONING -->
    <text x="40" y="290" font-size="120">CONDI</text>
    <text x="540" y="290" font-size="120">IONING</text>
    <g transform="translate(508,210)">
      <rect x="-28" y="0" width="56" height="10" fill="#0a0a0a"/>
      <path d="M-15 10 L0 70 L15 10 Z" fill="#0a0a0a"/>
      <rect x="-3" y="70" width="6" height="20" fill="#0a0a0a"/>
    </g>
  </g>
</svg>
