<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 1080" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Fairbairn-Sykes fighting knife">
  <defs>
    <!-- Blade gradient: catches light along the central spine for diamond cross-section illusion -->
    <linearGradient id="blade-grad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="oklch(0.30 0.005 80)"/>
      <stop offset="35%"  stop-color="oklch(0.62 0.008 85)"/>
      <stop offset="50%"  stop-color="oklch(0.88 0.012 90)"/>
      <stop offset="65%"  stop-color="oklch(0.62 0.008 85)"/>
      <stop offset="100%" stop-color="oklch(0.30 0.005 80)"/>
    </linearGradient>
    <!-- Brass cross-guard + pommel: aged brass tones -->
    <linearGradient id="brass-grad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="oklch(0.48 0.110 80)"/>
      <stop offset="50%"  stop-color="oklch(0.78 0.165 85)"/>
      <stop offset="100%" stop-color="oklch(0.45 0.105 80)"/>
    </linearGradient>
    <!-- Knurled grip: black with subtle vertical highlights -->
    <linearGradient id="grip-grad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="oklch(0.18 0.005 60)"/>
      <stop offset="50%"  stop-color="oklch(0.30 0.008 65)"/>
      <stop offset="100%" stop-color="oklch(0.16 0.005 60)"/>
    </linearGradient>
  </defs>

  <!-- Cap-badge gold glow halo behind whole knife (subtle) -->
  <ellipse cx="70" cy="540" rx="36" ry="540"
           fill="oklch(0.80 0.165 85 / 0.06)"
           filter="blur(20px)"/>

  <!-- Blade: tall slim leaf-shape with sharp point, double-edged -->
  <path d="M70 28
           L84 90
           L88 280
           L86 500
           L82 660
           L70 700
           L58 660
           L54 500
           L52 280
           L56 90
           Z"
        fill="url(#blade-grad)"
        stroke="oklch(0.10 0.005 60)"
        stroke-width="0.6"/>

  <!-- Central fuller / spine highlight running the length of the blade -->
  <line x1="70" y1="60" x2="70" y2="690"
        stroke="oklch(0.96 0.010 90 / 0.7)"
        stroke-width="0.8"
        stroke-linecap="round"/>

  <!-- Tang shoulder transition into cross-guard -->
  <rect x="60" y="695" width="20" height="14" fill="oklch(0.30 0.008 60)"/>

  <!-- Cross-guard: classic F-S S-curve simplified to a slim flared bar -->
  <path d="M28 710
           Q40 706 60 710
           L80 710
           Q100 706 112 710
           L112 728
           Q100 732 80 728
           L60 728
           Q40 732 28 728
           Z"
        fill="url(#brass-grad)"
        stroke="oklch(0.16 0.040 75)"
        stroke-width="0.6"/>

  <!-- Grip: cylindrical knurled handle -->
  <rect x="56" y="728" width="28" height="270"
        fill="url(#grip-grad)"
        stroke="oklch(0.10 0.005 60)"
        stroke-width="0.5"/>

  <!-- Knurl grooves: horizontal banding suggesting cast grip -->
  <g stroke="oklch(0.08 0.005 60)" stroke-width="0.6" opacity="0.7">
    <line x1="56" y1="745" x2="84" y2="745"/>
    <line x1="56" y1="760" x2="84" y2="760"/>
    <line x1="56" y1="775" x2="84" y2="775"/>
    <line x1="56" y1="790" x2="84" y2="790"/>
    <line x1="56" y1="805" x2="84" y2="805"/>
    <line x1="56" y1="820" x2="84" y2="820"/>
    <line x1="56" y1="835" x2="84" y2="835"/>
    <line x1="56" y1="850" x2="84" y2="850"/>
    <line x1="56" y1="865" x2="84" y2="865"/>
    <line x1="56" y1="880" x2="84" y2="880"/>
    <line x1="56" y1="895" x2="84" y2="895"/>
    <line x1="56" y1="910" x2="84" y2="910"/>
    <line x1="56" y1="925" x2="84" y2="925"/>
    <line x1="56" y1="940" x2="84" y2="940"/>
    <line x1="56" y1="955" x2="84" y2="955"/>
    <line x1="56" y1="970" x2="84" y2="970"/>
    <line x1="56" y1="985" x2="84" y2="985"/>
  </g>

  <!-- Grip highlight: thin vertical highlight catching light -->
  <line x1="64" y1="730" x2="64" y2="996"
        stroke="oklch(0.55 0.010 70 / 0.5)"
        stroke-width="1"/>

  <!-- Pommel: brass acorn knob -->
  <path d="M52 998
           Q70 996 88 998
           L86 1024
           Q70 1036 54 1024
           Z"
        fill="url(#brass-grad)"
        stroke="oklch(0.16 0.040 75)"
        stroke-width="0.6"/>

  <!-- Pommel tip stud -->
  <circle cx="70" cy="1042" r="4"
          fill="oklch(0.78 0.165 85)"
          stroke="oklch(0.30 0.080 75)"
          stroke-width="0.5"/>
</svg>
